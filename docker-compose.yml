version: '2'
services:
  db:
    image: postgres:11.2
    volumes:
      - postgresql_data:/var/lib/postgresql/data

  rabbit:
    image: rabbitmq:3.7.13-alpine
    expose:
      - "5672"

  redis:
    image: redis:5.0.5-alpine
    expose:
      - "6379"

  app:
    build: .
    environment:
      RAILS_ENV: $RAILS_ENV

    expose:
      - "3000"
    depends_on:
      - db
      - rabbit
      # - redis

  brainz_importer:
    build: .
    depends_on:
      - app
      - rabbit
    entrypoint: config/containers/importers/importer_cmd.sh
    environment:
      - IMPORT_ORDER_CLASS=BrainzImportOrder

  brainz_import_daemon:
    build: .
    depends_on:
      - app
      - db
      - redis
    entrypoint: config/containers/import_daemons/entrypoint.sh
    environment:
      - IMPORT_ORDER_CLASS=BrainzImportOrder

  web:
    build:
      context: .
      dockerfile: config/containers/nginx/Dockerfile
    links:
      - app
    ports:
      - "8888:80"

volumes:
  postgresql_data: {}
