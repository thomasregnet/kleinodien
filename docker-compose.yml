version: '2'
services:
  db:
    image: postgres:11.2
    volumes:
      - postgresql_data:/var/lib/postgresql/data

  redis:
    image: redis:5.0.3
    ports:
      - '6379:6379'

  app:
    build: .
    environment:
      RAILS_ENV: $RAILS_ENV

    links:
      - db
    expose:
      - "3000"
    depends_on:
      - db
      - redis
  brainz_importer:
    build: .
    depends_on:
      - app
      - redis
    entrypoint: config/containers/importers/importer_cmd.sh
    environment:
      - IMPORTER_NAME=brainz
  web:
    build:
      context: .
      dockerfile: config/containers/nginx/Dockerfile
    links:
      - app
    ports:
      - "8888:80"

volumes:
  postgresql_data: {}
